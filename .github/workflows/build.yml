name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Astro build
        env:
          MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID }}
          PUBLIC_GOOGLE_VERIFY: ${{ vars.PUBLIC_GOOGLE_VERIFY }}
          PUBLIC_NAVER_VERIFY: ${{ vars.PUBLIC_NAVER_VERIFY }}
          PUBLIC_WEB3FORMS_KEY: ${{ vars.PUBLIC_WEB3FORMS_KEY }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CF_ANALYTICS_TOKEN }}
        run: npm run build

      - name: Upload build artifact (backup, optional)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

      - name: Apply D1 migrations (idempotent — CREATE IF NOT EXISTS)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute medikr-analytics --remote --file=migrations/0001_visits.sql

      - name: Register D1 binding to Pages project
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          curl -X PATCH "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/medikr" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"d1_databases":{"DB":{"id":"e5e3974c-98ae-45a0-bbaa-e37a9043dfbe"}}}}}'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 한글 commit message → CF API Invalid UTF-8 회피: SHA + dirty 만 전달
          command: pages deploy dist --project-name=medikr --branch=main --commit-message="${{ github.sha }}"
