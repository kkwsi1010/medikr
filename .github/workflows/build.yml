name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Astro build
        env:
          MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID }}
          PUBLIC_GOOGLE_VERIFY: ${{ vars.PUBLIC_GOOGLE_VERIFY }}
          PUBLIC_NAVER_VERIFY: ${{ vars.PUBLIC_NAVER_VERIFY }}
          PUBLIC_WEB3FORMS_KEY: ${{ vars.PUBLIC_WEB3FORMS_KEY }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CF_ANALYTICS_TOKEN }}
        run: npm run build

      - name: Upload build artifact (backup, optional)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

      - name: Apply D1 migrations (idempotent — CREATE IF NOT EXISTS)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute medikr-analytics --remote --file=migrations/0001_visits.sql

      - name: Register D1 binding to Pages project
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          curl -X PATCH "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/medikr" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"d1_databases":{"DB":{"id":"e5e3974c-98ae-45a0-bbaa-e37a9043dfbe"}}}}}'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 한글 commit message → CF API Invalid UTF-8 회피: SHA + dirty 만 전달
          command: pages deploy dist --project-name=medikr --branch=main --commit-message="${{ github.sha }}"

      - name: Cloudflare Cache Rule — /drug/* edge 캐시 (idempotent)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          # drug 페이지는 매 요청 식약처 API 4개 호출(~3-7s) → edge 캐시로 첫 요청만 느리게.
          # Pages Functions(SSR) 응답은 기본 DYNAMIC(캐시 X) → Cache Rule 로 강제 캐시.
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=medikr.kr" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')")
          echo "zone_id=$ZONE_ID"
          if [ -n "$ZONE_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/rulesets/phases/http_request_cache_settings/entrypoint" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{"rules":[{"expression":"(starts_with(http.request.uri.path, \"/drug/\")) or (starts_with(http.request.uri.path, \"/api/sitemap\"))","action":"set_cache_settings","action_parameters":{"cache":true,"edge_ttl":{"mode":"override_origin","default":86400},"browser_ttl":{"mode":"override_origin","default":300}}}]}' \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print('cache rule:', 'OK' if d.get('success') else d.get('errors'))"
          fi
