name: Build & Deploy

on:
  push:
    branches: [main]
  # 파킹: 매일 자동 재빌드(schedule) 제거. push / 수동(workflow_dispatch) 시에만 배포.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Astro build
        env:
          MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA4_ID: ${{ vars.PUBLIC_GA4_ID }}
          PUBLIC_GOOGLE_VERIFY: ${{ vars.PUBLIC_GOOGLE_VERIFY }}
          PUBLIC_NAVER_VERIFY: ${{ vars.PUBLIC_NAVER_VERIFY }}
          PUBLIC_WEB3FORMS_KEY: ${{ vars.PUBLIC_WEB3FORMS_KEY }}
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ vars.PUBLIC_CF_ANALYTICS_TOKEN }}
          # 광고 네트워크 — Repo Variables 에 값 넣으면 자동 반영, 없으면 렌더 안 함
          PUBLIC_ADFIT_UNIT: ${{ vars.PUBLIC_ADFIT_UNIT }}
          PUBLIC_COUPANG_ID: ${{ vars.PUBLIC_COUPANG_ID }}
          PUBLIC_COUPANG_TRACKING: ${{ vars.PUBLIC_COUPANG_TRACKING }}
          # 빌드 SHA → drug 페이지 캐시 네임스페이스. 빌드마다 새 키로 옛 캐시 응답 격리.
          PUBLIC_CACHE_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Upload build artifact (backup, optional)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: ignore

      - name: Apply D1 migrations (idempotent — CREATE IF NOT EXISTS)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute medikr-analytics --remote --file=migrations/0001_visits.sql

      - name: Apply D1 drug_cache schema
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute medikr-analytics --remote --file=migrations/0002_drug_cache.sql

      - name: Seed D1 drug_cache (build-index 가 생성한 약 상세 적재)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute medikr-analytics --remote --file=migrations/seed-drugs.sql

      - name: Register D1 binding to Pages project
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          curl -X PATCH "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/medikr" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"d1_databases":{"DB":{"id":"e5e3974c-98ae-45a0-bbaa-e37a9043dfbe"}}}}}'

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 한글 commit message → CF API Invalid UTF-8 회피: SHA + dirty 만 전달
          command: pages deploy dist --project-name=medikr --branch=main --commit-message="${{ github.sha }}"

      - name: IndexNow — 네이버/Bing 색인 알림 (주요 URL + 최근 허가약)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          KEY="4d6b9f2a8c1e7305b9d4f6a2c8e0b1d3"
          URLS=$(python3 -c "
          import json
          urls = ['https://medikr.kr/','https://medikr.kr/search/','https://medikr.kr/api/','https://medikr.kr/contact/']
          try:
            rp = json.load(open('src/data/recent-permits.json'))
            urls += ['https://medikr.kr/drug/%s/' % r['seq'] for r in rp[:30]]
          except Exception: pass
          print(json.dumps(urls))
          ")
          echo "IndexNow 제출 URL 수: $(echo "$URLS" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"medikr.kr\",\"key\":\"$KEY\",\"keyLocation\":\"https://medikr.kr/$KEY.txt\",\"urlList\":$URLS}" \
            -w "IndexNow HTTP %{http_code}\n"
